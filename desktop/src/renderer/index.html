<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Watermark Remover</title>
    <style>
        :root {
            --bg: #f2f6f9;
            --panel: #ffffff;
            --ink: #101a2a;
            --subtle: #526079;
            --accent: #147d75;
            --accent-soft: #d6f6f1;
            --line: #d8e2ec;
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 14% 6%, #e0f7f4 0, rgba(224, 247, 244, 0) 42%),
                radial-gradient(circle at 85% 96%, #cfe6fb 0, rgba(207, 230, 251, 0) 36%),
                var(--bg);
        }

        .app {
            min-height: 100vh;
            padding: 20px;
            display: grid;
            grid-template-columns: minmax(320px, 1.2fr) minmax(320px, 1fr);
            gap: 16px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 12px 38px rgba(16, 26, 42, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .panel-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .panel-subtitle {
            margin: 2px 0 0;
            font-size: 12px;
            color: var(--subtle);
        }

        .pill {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .controls {
            padding: 12px 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            border-bottom: 1px solid var(--line);
            background: #f8fbfd;
        }

        .control {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            color: var(--subtle);
        }

        .control input[type="range"] {
            width: 100%;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        button {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            background: white;
            color: var(--ink);
            font-weight: 600;
        }

        button.primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        button.toggle-on {
            border-color: var(--danger);
            background: #fee2e2;
            color: var(--danger);
        }

        .canvas-wrap {
            position: relative;
            flex: 1;
            min-height: 360px;
            overflow: hidden;
            background:
                linear-gradient(45deg, #edf2f7 25%, transparent 25%),
                linear-gradient(-45deg, #edf2f7 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #edf2f7 75%),
                linear-gradient(-45deg, transparent 75%, #edf2f7 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        }

        #paintCanvas {
            position: absolute;
            left: 0;
            top: 0;
            cursor: crosshair;
        }

        .drop-zone {
            position: absolute;
            inset: 16px;
            border: 2px dashed #90a7bb;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--subtle);
            background: rgba(255, 255, 255, 0.85);
            pointer-events: none;
            font-size: 14px;
            padding: 16px;
        }

        .drop-zone.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .status-row {
            padding: 12px 16px;
            border-top: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 13px;
            color: var(--subtle);
        }

        .result-area {
            flex: 1;
            overflow: auto;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fbfcfd;
        }

        .result-area img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            border: 1px solid var(--line);
        }

        .empty-note {
            color: var(--subtle);
            font-size: 14px;
            text-align: center;
            padding: 24px;
        }

        @media (max-width: 980px) {
            .app {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <section class="panel">
            <header class="panel-header">
                <div>
                    <h1 class="panel-title">Mask Watermark</h1>
                    <p class="panel-subtitle">Drop image, brush over watermark, then remove</p>
                </div>
                <div id="backendPill" class="pill">Backend: unknown</div>
            </header>

            <div class="controls">
                <label class="control">
                    Brush size <span id="brushSizeLabel">40px</span>
                    <input id="brushSize" type="range" min="8" max="180" step="1" value="40" />
                </label>

                <label class="control">
                    Zoom <span id="zoomLabel">100%</span>
                    <input id="zoomSlider" type="range" min="25" max="400" step="5" value="100" />
                </label>

                <div class="control">
                    Actions
                    <div class="toolbar">
                        <button id="eraserBtn" type="button">Eraser Off</button>
                        <button id="clearMaskBtn" type="button">Clear Mask</button>
                        <button id="resetViewBtn" type="button">Reset View</button>
                        <button id="removeBtn" class="primary" type="button">Remove Watermark</button>
                    </div>
                </div>
            </div>

            <div id="canvasWrap" class="canvas-wrap">
                <canvas id="paintCanvas"></canvas>
                <div id="dropZone" class="drop-zone">Drop a PNG/JPG image here to begin</div>
            </div>

            <footer class="status-row">
                <span id="statusText">Status: idle</span>
                <span id="fileText">No image selected</span>
            </footer>
        </section>

        <section class="panel">
            <header class="panel-header">
                <div>
                    <h2 class="panel-title">Output Preview</h2>
                    <p class="panel-subtitle">Result appears here after inpainting</p>
                </div>
            </header>
            <div class="result-area" id="resultArea">
                <div class="empty-note">Run removal to preview output.</div>
            </div>
    </div>
    </div>
    <script src="./renderer.js"></script>
</body>

</html>
